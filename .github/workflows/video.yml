name: 🎬 Vivi 每日影片自動生成

on:
  schedule:
    - cron: '0 23 * * *'   # 每天 UTC 23:00 = 台灣 07:00
  workflow_dispatch:         # 手動觸發（測試用）
    inputs:
      topic:
        description: '指定選題（留空則自動選）'
        required: false
        default: ''

jobs:
  produce-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (fonts + ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          pip install google-genai requests notion-client moviepy==1.0.3 pillow numpy \
                      google-api-python-client google-auth-httplib2 google-auth-oauthlib \
                      edge-tts imageio-ffmpeg

      - name: Restore YouTube OAuth token
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > token.pickle

      - name: Run video production pipeline
        env:
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY:     ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID:    ${{ secrets.ELEVENLABS_VOICE_ID }}
          YOUTUBE_API_KEY:        ${{ secrets.YOUTUBE_API_KEY }}
          NOTION_TOKEN:           ${{ secrets.NOTION_TOKEN }}
          NOTION_VIDEO_DB:        ${{ secrets.NOTION_VIDEO_DB }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MANUAL_TOPIC:           ${{ github.event.inputs.topic }}
          EXECUTION_MODE:         "FULL"
        run: python daily_video.py

      - name: Commit used_topics history
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_topics.json topic_rankings.json used_photos.json content_meta.json plan_30d.json || true
          git diff --cached --quiet || git commit -m "chore: update used_topics [skip ci]"
          git push || true

      - name: Upload video artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: video-${{ github.run_number }}
          path: |
            video_final.mp4
            video_meta.json
            content_meta.json
          retention-days: 14
