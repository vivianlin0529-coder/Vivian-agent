name: Vivi AI研習社 每日影片自動生產

on:
  schedule:
    - cron: "0 1 * * *"   # 台北時間 09:00
  workflow_dispatch:
    inputs:
      manual_topic:
        description: "手動指定選題（留空則自動）"
        required: false
        default: ""

jobs:
  produce-video:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system fonts & ffmpeg
        run: |
          sudo apt-get update -q
          sudo apt-get install -y fonts-noto-cjk ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Restore YouTube token
        if: env.YOUTUBE_TOKEN_B64 != ''
        run: echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > token.pickle
        env:
          YOUTUBE_TOKEN_B64: ${{ secrets.YOUTUBE_TOKEN_B64 }}

      - name: Run daily video pipeline
        id: pipeline
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY:     ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_TOKEN_B64:   ${{ secrets.YOUTUBE_TOKEN_B64 }}
          NOTION_TOKEN:        ${{ secrets.NOTION_TOKEN }}
          NOTION_VIDEO_DB:     ${{ secrets.NOTION_VIDEO_DB }}
          MANUAL_TOPIC:        ${{ github.event.inputs.manual_topic }}
        run: python daily_video.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vivi-video-${{ github.run_number }}
          path: |
            video_final.mp4
            voice.mp3
            video_meta_*.json
            screenshot_step*.png
          retention-days: 7

      - name: Print result
        if: steps.pipeline.outputs.youtube_url != ''
        run: echo "✅ 上架：${{ steps.pipeline.outputs.youtube_url }}"
