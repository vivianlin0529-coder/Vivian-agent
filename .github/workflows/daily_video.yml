name: Vivi AI研習社 每日影片自動生產

on:
  schedule:
    # 每天台北時間 09:00（UTC 01:00）執行
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      manual_topic:
        description: "手動指定選題（留空則自動分析）"
        required: false
        default: ""

jobs:
  produce-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 環境準備 ───────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system fonts (CJK)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y fonts-noto-cjk ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── YouTube token 還原 ─────────────────────────────────────────
      - name: Restore YouTube token
        if: env.YOUTUBE_TOKEN_B64 != ''
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > token.pickle
        env:
          YOUTUBE_TOKEN_B64: ${{ secrets.YOUTUBE_TOKEN_B64 }}

      # ── 主流程 ─────────────────────────────────────────────────────
      - name: Run daily video pipeline
        id: pipeline
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY:  ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          YOUTUBE_API_KEY:     ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_TOKEN_B64:   ${{ secrets.YOUTUBE_TOKEN_B64 }}
          NOTION_TOKEN:        ${{ secrets.NOTION_TOKEN }}
          NOTION_VIDEO_DB:     ${{ secrets.NOTION_VIDEO_DB }}
          MANUAL_TOPIC:        ${{ github.event.inputs.manual_topic }}
        run: python daily_video.py

      # ── 產出物保存（7 天）─────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vivi-video-${{ github.run_number }}
          path: |
            video_final.mp4
            voice.mp3
            video_meta_*.json
          retention-days: 7

      # ── 成功通知（可選：改為 Line / Discord / Email）──────────────
      - name: Print result
        if: steps.pipeline.outputs.youtube_url != ''
        run: |
          echo "✅ 影片已上架：${{ steps.pipeline.outputs.youtube_url }}"
          echo "   標題：${{ steps.pipeline.outputs.video_title }}"
