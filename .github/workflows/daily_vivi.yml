name: Vivi AI Daily Workflow

on:
  schedule:
    - cron: '30 0 * * *'  # 台灣時間每天 08:30 (UTC 00:30)
  workflow_dispatch:
    inputs:
      mode:
        description: '選擇執行模式'
        required: true
        default: 'PREVIEW'
        type: choice
        options:
          - PREVIEW
          - FULL

jobs:
  run-vivi-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Chinese fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: |
          pip install requests google-genai google-api-python-client google-auth-oauthlib playwright
          playwright install chromium

      - name: Run Vivi Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_TOKEN_B64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_VIDEO_DB: ${{ secrets.NOTION_VIDEO_DB }}
          EXECUTION_MODE: ${{ github.event.inputs.mode || 'PREVIEW' }}
        run: python daily_video.py

      - name: Upload Video Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-vivi-video
          path: daily_preview_video.mp4
          retention-days: 1
