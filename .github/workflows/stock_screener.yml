name: 台股蓄勢選股 — 每日 13:30 自動掃描

on:
  schedule:
    - cron: "30 5 * * 1-5"
  workflow_dispatch:
    inputs:
      trial_n:
        description: "試跑股數（空白=全市場）"
        required: false
        default: ""

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r stock-screener/requirements.txt

      - name: Check trading day (skip holidays)
        id: check_day
        run: |
          python - << 'EOF'
          import datetime, os
          today = datetime.date.today()
          TW_HOLIDAYS = {
              datetime.date(2026, 1, 1),
              datetime.date(2026, 1, 27), datetime.date(2026, 1, 28),
              datetime.date(2026, 1, 29), datetime.date(2026, 1, 30),
              datetime.date(2026, 2, 2),  datetime.date(2026, 2, 28),
              datetime.date(2026, 4, 3),  datetime.date(2026, 4, 4),
              datetime.date(2026, 4, 5),  datetime.date(2026, 6, 19),
              datetime.date(2026, 9, 25), datetime.date(2026, 10, 9),
              datetime.date(2026, 10, 10),
          }
          is_holiday = today in TW_HOLIDAYS
          print(f"今日 {today}：{'國定假日，跳過' if is_holiday else '交易日，開始選股'}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"is_holiday={'true' if is_holiday else 'false'}\n")
          EOF

      - name: Run stock screener
        if: steps.check_day.outputs.is_holiday != 'true'
        env:
          GMAIL_USER:    ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PWD: ${{ secrets.GMAIL_APP_PWD }}
          MAIL_TO:       ${{ secrets.MAIL_TO }}
        run: |
          cd stock-screener
          python stock_screener_v6.py

      - name: Upload result CSV
        if: steps.check_day.outputs.is_holiday != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: screening-result-${{ github.run_id }}
          path: /tmp/台股選股_*.csv
          if-no-files-found: ignore
          retention-days: 30
